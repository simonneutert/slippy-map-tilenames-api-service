name: Crystal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    container:
      image: crystallang/crystal:1.19.1
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: shards install
    
    - name: Run tests
      run: KEMAL_ENV=test crystal spec --error-trace
    
    - name: Build
      run: crystal build src/slippy.cr --release
